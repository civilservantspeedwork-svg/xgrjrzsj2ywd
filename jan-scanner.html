<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>JANスキャナー</title>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #141414;
      --surface2: #1c1c1c;
      --border: #2a2a2a;
      --accent: #00e676;
      --accent-dim: rgba(0, 230, 118, 0.12);
      --accent-glow: rgba(0, 230, 118, 0.3);
      --text: #e8e8e8;
      --text-dim: #666;
      --danger: #ff5252;
      --yellow: #ffd740;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans JP', sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    /* Header */
    .header {
      padding: 14px 20px 12px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--surface);
    }
    .header-icon {
      width: 28px; height: 28px;
      background: var(--accent);
      border-radius: 4px;
      display: flex; align-items: center; justify-content: center;
    }
    .header-icon svg { width: 16px; height: 16px; }
    .header-title {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.05em;
      color: var(--text);
    }
    .header-sub {
      font-size: 11px;
      color: var(--text-dim);
      margin-left: auto;
      font-family: 'Share Tech Mono', monospace;
    }

    /* Scanner area */
    .scanner-wrap {
      position: relative;
      background: #000;
      width: 100%;
      aspect-ratio: 1 / 1;
      max-height: 60vw;
      overflow: hidden;
    }

    #reader {
      width: 100% !important;
      height: 100% !important;
    }

    /* Override html5-qrcode styles */
    #reader video {
      width: 100% !important;
      height: 100% !important;
      object-fit: cover !important;
    }
    #reader img { display: none !important; }
    #reader__scan_region { border: none !important; }

    /* Scanner overlay */
    .scanner-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 10;
    }
    .scan-frame {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 70%; max-width: 240px;
      height: 120px;
    }
    .scan-frame::before, .scan-frame::after,
    .scan-frame span::before, .scan-frame span::after {
      content: '';
      position: absolute;
      width: 20px; height: 20px;
      border-color: var(--accent);
      border-style: solid;
    }
    .scan-frame::before { top: 0; left: 0; border-width: 2px 0 0 2px; }
    .scan-frame::after  { top: 0; right: 0; border-width: 2px 2px 0 0; }
    .scan-frame span::before { bottom: 0; left: 0; border-width: 0 0 2px 2px; }
    .scan-frame span::after  { bottom: 0; right: 0; border-width: 0 2px 2px 0; }

    .scan-line {
      position: absolute;
      left: 15%; right: 15%;
      height: 1.5px;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent-glow);
      animation: scanMove 2s ease-in-out infinite;
      opacity: 0.8;
    }
    @keyframes scanMove {
      0%   { top: 20%; opacity: 0; }
      10%  { opacity: 0.8; }
      90%  { opacity: 0.8; }
      100% { top: 80%; opacity: 0; }
    }

    .scanner-status {
      position: absolute;
      bottom: 10px;
      left: 50%; transform: translateX(-50%);
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      color: var(--accent);
      letter-spacing: 0.1em;
      background: rgba(0,0,0,0.6);
      padding: 3px 10px;
      border-radius: 2px;
      white-space: nowrap;
    }

    /* Scanner stopped state */
    .scanner-stopped {
      position: absolute;
      inset: 0;
      background: var(--surface);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      z-index: 20;
    }
    .scanner-stopped svg {
      width: 48px; height: 48px;
      color: var(--text-dim);
    }
    .scanner-stopped p {
      font-size: 13px;
      color: var(--text-dim);
    }

    /* Start button */
    .btn-start {
      background: var(--accent);
      color: #000;
      border: none;
      padding: 10px 28px;
      border-radius: 4px;
      font-size: 14px;
      font-weight: 700;
      font-family: 'Noto Sans JP', sans-serif;
      cursor: pointer;
      letter-spacing: 0.05em;
    }

    /* Bottom panel */
    .bottom-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 16px;
      gap: 12px;
      background: var(--bg);
    }

    /* Result box */
    .result-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      min-height: 58px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .result-box.has-result {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px var(--accent-dim), 0 0 16px var(--accent-dim);
    }
    .result-label {
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 0.1em;
      font-family: 'Share Tech Mono', monospace;
      min-width: 30px;
    }
    .result-code {
      font-family: 'Share Tech Mono', monospace;
      font-size: 22px;
      color: var(--accent);
      letter-spacing: 0.08em;
      flex: 1;
      transition: all 0.2s;
    }
    .result-code.empty {
      font-size: 13px;
      color: var(--text-dim);
    }
    .result-copy {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-dim);
      width: 32px; height: 32px;
      border-radius: 4px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
      flex-shrink: 0;
    }
    .result-copy:active { background: var(--accent-dim); border-color: var(--accent); }
    .result-copy svg { width: 14px; height: 14px; }

    /* Action buttons */
    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .btn-mercari {
      border: none;
      border-radius: 6px;
      padding: 12px 8px;
      font-size: 13px;
      font-weight: 700;
      font-family: 'Noto Sans JP', sans-serif;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      line-height: 1.3;
    }
    .btn-mercari:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }
    .btn-sold {
      background: var(--accent);
      color: #000;
    }
    .btn-sold:not(:disabled):active {
      background: #00c853;
      transform: scale(0.97);
    }
    .btn-all {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-all:not(:disabled):active {
      background: var(--surface);
      transform: scale(0.97);
    }
    .btn-sub {
      font-size: 10px;
      font-weight: 400;
      opacity: 0.7;
    }

    /* History */
    .history-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2px;
    }
    .history-title {
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: 0.1em;
      font-family: 'Share Tech Mono', monospace;
    }
    .btn-clear {
      font-size: 11px;
      color: var(--danger);
      background: none;
      border: none;
      cursor: pointer;
      padding: 2px 4px;
      font-family: 'Noto Sans JP', sans-serif;
    }

    .history-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-height: 200px;
      overflow-y: auto;
    }
    .history-list::-webkit-scrollbar { width: 3px; }
    .history-list::-webkit-scrollbar-track { background: transparent; }
    .history-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .history-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 8px 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .history-item:active { border-color: var(--accent); }
    .history-item .h-code {
      font-family: 'Share Tech Mono', monospace;
      font-size: 14px;
      color: var(--text);
      flex: 1;
    }
    .history-item .h-time {
      font-size: 10px;
      color: var(--text-dim);
      font-family: 'Share Tech Mono', monospace;
    }
    .history-item .h-arrow {
      color: var(--text-dim);
      font-size: 12px;
    }

    .history-empty {
      font-size: 12px;
      color: var(--text-dim);
      text-align: center;
      padding: 16px;
    }

    /* Flash effect on scan */
    @keyframes flashGreen {
      0%   { background: var(--accent-dim); }
      100% { background: var(--surface); }
    }
    .flash { animation: flashGreen 0.4s ease-out; }
  </style>
</head>
<body>

<div class="header">
  <div class="header-icon">
    <svg viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2.5">
      <rect x="3" y="3" width="4" height="18" rx="1"/>
      <rect x="9" y="3" width="2" height="18" rx="1"/>
      <rect x="13" y="3" width="4" height="18" rx="1"/>
      <rect x="19" y="3" width="2" height="18" rx="1"/>
    </svg>
  </div>
  <div class="header-title">JANスキャナー</div>
  <div class="header-sub">→ MERCARI</div>
</div>

<div class="scanner-wrap">
  <div id="reader"></div>
  <div class="scanner-overlay">
    <div class="scan-frame"><span></span></div>
    <div class="scan-line"></div>
    <div class="scanner-status" id="scannerStatus">バーコードをフレームに合わせてください</div>
  </div>
  <div class="scanner-stopped" id="scannerStopped">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M3 3l18 18M10.5 10.677A2 2 0 0013.5 13.5m-3-2.823A2 2 0 0112 10a2 2 0 012 2m-3-2.823V4.5M12 20.25a8.25 8.25 0 100-16.5 8.25 8.25 0 000 16.5z"/>
    </svg>
    <p>カメラを起動してスキャン</p>
    <button class="btn-start" id="btnStart">カメラ起動</button>
  </div>
</div>

<div class="bottom-panel">

  <div class="result-box" id="resultBox">
    <div class="result-label">JAN</div>
    <div class="result-code empty" id="resultCode">スキャン待機中</div>
    <button class="result-copy" id="btnCopy" title="コピー">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="9" y="9" width="13" height="13" rx="2"/>
        <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
      </svg>
    </button>
  </div>

  <div class="actions">
    <button class="btn-mercari btn-sold" id="btnSold" disabled>
      <span>売り切れで検索</span>
      <span class="btn-sub">成約相場を確認</span>
    </button>
    <button class="btn-mercari btn-all" id="btnAll" disabled>
      <span>全件検索</span>
      <span class="btn-sub">現在の出品を確認</span>
    </button>
  </div>

  <div class="history-header">
    <div class="history-title">SCAN HISTORY</div>
    <button class="btn-clear" id="btnClear">クリア</button>
  </div>
  <div class="history-list" id="historyList">
    <div class="history-empty">スキャン履歴なし</div>
  </div>

</div>

<script>
  let html5QrCode = null;
  let isScanning = false;
  let currentCode = null;
  let history = JSON.parse(localStorage.getItem('janHistory') || '[]');

  const resultBox = document.getElementById('resultBox');
  const resultCode = document.getElementById('resultCode');
  const btnSold = document.getElementById('btnSold');
  const btnAll = document.getElementById('btnAll');
  const btnCopy = document.getElementById('btnCopy');
  const btnStart = document.getElementById('btnStart');
  const scannerStopped = document.getElementById('scannerStopped');
  const scannerStatus = document.getElementById('scannerStatus');
  const historyList = document.getElementById('historyList');

  // Init
  renderHistory();

  // Start scanner
  btnStart.addEventListener('click', startScanner);

  async function startScanner() {
    scannerStopped.style.display = 'none';
    html5QrCode = new Html5Qrcode("reader");

    const config = {
      fps: 15,
      qrbox: { width: 250, height: 100 },
      formatsToSupport: [
        Html5QrcodeSupportedFormats.EAN_13,
        Html5QrcodeSupportedFormats.EAN_8,
        Html5QrcodeSupportedFormats.UPC_A,
        Html5QrcodeSupportedFormats.CODE_128,
      ],
      aspectRatio: 1.0,
    };

    try {
      await html5QrCode.start(
        { facingMode: "environment" },
        config,
        onScanSuccess,
        () => {}
      );
      isScanning = true;
      scannerStatus.textContent = 'バーコードをフレームに合わせてください';
    } catch(err) {
      scannerStopped.style.display = 'flex';
      scannerStatus.textContent = 'カメラエラー';
      alert('カメラを起動できませんでした。ブラウザの権限設定を確認してください。');
    }
  }

  function onScanSuccess(decodedText) {
    if (decodedText === currentCode) return;
    currentCode = decodedText;

    // Haptic feedback
    if (navigator.vibrate) navigator.vibrate(60);

    // Update UI
    resultCode.textContent = decodedText;
    resultCode.classList.remove('empty');
    resultBox.classList.add('has-result');
    resultBox.classList.add('flash');
    setTimeout(() => resultBox.classList.remove('flash'), 400);

    btnSold.disabled = false;
    btnAll.disabled = false;
    scannerStatus.textContent = '✓ ' + decodedText;

    // Add to history
    addHistory(decodedText);

    // Reset after 3s to allow re-scan
    setTimeout(() => {
      currentCode = null;
      scannerStatus.textContent = 'バーコードをフレームに合わせてください';
    }, 3000);
  }

  // Mercari search
  btnSold.addEventListener('click', () => {
    const code = resultCode.textContent;
    if (!code || code === 'スキャン待機中') return;
    const url = `https://jp.mercari.com/search?keyword=${encodeURIComponent(code)}&status=sold_out&sort=created_time&order=desc`;
    window.open(url, '_blank');
  });

  btnAll.addEventListener('click', () => {
    const code = resultCode.textContent;
    if (!code || code === 'スキャン待機中') return;
    const url = `https://jp.mercari.com/search?keyword=${encodeURIComponent(code)}&sort=created_time&order=desc`;
    window.open(url, '_blank');
  });

  // Copy
  btnCopy.addEventListener('click', () => {
    const code = resultCode.textContent;
    if (!code || resultCode.classList.contains('empty')) return;
    navigator.clipboard?.writeText(code).then(() => {
      btnCopy.style.borderColor = 'var(--accent)';
      setTimeout(() => btnCopy.style.borderColor = '', 800);
    });
  });

  // History
  function addHistory(code) {
    const now = new Date();
    const time = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
    history.unshift({ code, time });
    if (history.length > 20) history = history.slice(0, 20);
    localStorage.setItem('janHistory', JSON.stringify(history));
    renderHistory();
  }

  function renderHistory() {
    if (history.length === 0) {
      historyList.innerHTML = '<div class="history-empty">スキャン履歴なし</div>';
      return;
    }
    historyList.innerHTML = history.map((item, i) => `
      <div class="history-item" onclick="searchFromHistory('${item.code}')">
        <div class="h-code">${item.code}</div>
        <div class="h-time">${item.time}</div>
        <div class="h-arrow">›</div>
      </div>
    `).join('');
  }

  function searchFromHistory(code) {
    resultCode.textContent = code;
    resultCode.classList.remove('empty');
    resultBox.classList.add('has-result');
    btnSold.disabled = false;
    btnAll.disabled = false;
    const url = `https://jp.mercari.com/search?keyword=${encodeURIComponent(code)}&status=sold_out&sort=created_time&order=desc`;
    window.open(url, '_blank');
  }

  document.getElementById('btnClear').addEventListener('click', () => {
    history = [];
    localStorage.removeItem('janHistory');
    renderHistory();
  });
</script>
</body>
</html>
